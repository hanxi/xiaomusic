<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="./favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>插件配置</title>
    <script src="./config.js"></script>
    <link rel="preload" href="../default/materialicons.woff2" as="font" type="font/woff2" crossorigin>
    <style>
        /* ==================== Material Icons 字体定义 ==================== */
        @font-face {
            font-family: 'Material Icons';
            font-style: normal;
            font-weight: 400;
            font-display: block;
            src: url(../default/materialicons.woff2) format('woff2');
        }

        .material-icons {
            font-family: 'Material Icons';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
            visibility: hidden;
        }

        .fonts-loaded .material-icons {
            visibility: visible;
        }

        /* 全局样式 */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: none;
        }

        /* 容器样式 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        /* 页面头部样式 */
        .header {
            background: #fff;
            color: #333;
            padding: 20px;
            text-align: center;
            position: relative;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0 0 8px 0;
            font-size: 24px;
            color: #333;
        }

        .header p {
            margin: 0 0 15px 0;
            font-size: 14px;
            color: #6c757d;
        }

        .version-info {
            position: absolute;
            top: 10px;
            left: 20px;
            color: #6c757d;
            font-size: 14px;
            background: rgba(0, 123, 255, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            z-index: 10;
        }

        /* 顶部按钮样式 */
        .header-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .header-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .header-btn:hover {
            background-color: #0056b3;
            transform: translateY(-1px);
        }

        .header-btn svg {
            width: 18px;
            height: 18px;
        }

        /* 插件设置区域样式 */
        .plugins-section {
            padding: 20px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-top: 15px;
            margin-bottom: 15px;
            color: #333;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .border-bottom {
            margin-top: 15px;
            margin-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 10px;
        }

        .plugin-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .plugin-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 8px;
            background: #f8f9fa;
            transition: all 0.2s ease;
        }

        .plugin-item:hover {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            background: #fff;
        }

        .plugin-info {
            flex: 1;
        }

        .plugin-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 8px;
            color: #333;
        }

        .plugin-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 5px;
        }

        .status-enabled {
            background: #e3f2fd;
            color: #007bff;
        }

        .status-disabled {
            background: #ffebee;
            color: #f44336;
        }

        .plugin-details {
            font-size: 13px;
            color: #6c757d;
        }

        .plugin-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .enable-btn {
            background-color: #007bff;
            color: white;
        }

        .enable-btn:hover {
            background-color: #0056b3;
            transform: translateY(-1px);
        }

        .disable-btn {
            background-color: #dc3545;
            color: white;
        }

        .disable-btn:hover {
            background-color: #c82333;
            transform: translateY(-1px);
        }

        .uninstall-btn {
            background-color: #6c757d;
            color: white;
        }

        .uninstall-btn:hover {
            background-color: #5a6268;
            transform: translateY(-1px);
        }

        .edit-btn {
            background-color: #17a2b8;
            color: white;
        }

        .edit-btn:hover {
            background-color: #138496;
            transform: translateY(-1px);
        }

        /* 状态消息样式 */
        .loading, .error, .empty {
            text-align: center;
            padding: 40px;
            color: #6c757d;
            font-size: 14px;
        }

        .error {
            color: #dc3545;
        }

        .empty {
            color: #6c757d;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                max-width: 100%;
                margin: 0;
                border-radius: 0;
                min-height: 100vh;
            }

            .header {
                padding: 15px;
            }

            .header h1 {
                font-size: 20px;
            }

            .header p {
                font-size: 13px;
            }

            .version-info {
                position: static;
                display: inline-block;
                margin-bottom: 10px;
            }

            .header-buttons {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 8px;
                justify-content: center;
            }

            .header-btn {
                padding: 8px 12px;
                font-size: 13px;
                flex: 0 0 auto;
            }

            .plugin-item {
                flex-direction: column;
                align-items: stretch;
                padding: 12px;
            }

            .plugin-info {
                margin-bottom: 10px;
            }

            .plugin-actions {
                flex-direction: row;
                justify-content: flex-end;
                gap: 8px;
                flex-wrap: wrap;
            }

            .action-btn {
                padding: 6px 12px;
                font-size: 12px;
            }
        }

        @media (max-width: 480px) {
            .header-buttons {
                gap: 6px;
            }

            .header-btn {
                flex: 1 1 calc(50% - 6px);
                min-width: 100px;
                padding: 8px 10px;
                font-size: 12px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                transition: none !important;
                animation: none !important;
            }
        }

        /* 动画效果 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

                <span class="material-icons">arrow_back</span>

            <button class="header-btn" onclick="uploadPlugins()">

            <button class="header-btn" onclick="loadPlugins()">

            <a href="https://pd.qq.com/s/3tkfauiqe?b=9" target="_blank" class="header-btn">

                    </g>
                </svg>
                <span>MusicFree频道</span>
            </a>
            <a href="https://github.com/boluofan/xiaomusic-online" target="_blank" class="header-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">

                </svg>
            </a>
        </div>
    </div>

    <div class="plugins-section">
        <!-- 插件源配置 -->
        <div class="section-title">插件源配置</div>
        <div id="plugin-source">
            <div class="plugin-item">
                <div class="plugin-info">
                    <div class="plugin-details">
                        <div><strong>插件源地址：</strong> <span id="source-url"></span></div>
                    </div>
                </div>
                <div class="plugin-actions">
                    <button class="action-btn enable-btn" id="refresh-source-btn" onclick="refreshPluginSource()">
                        <span class="material-icons">refresh</span>
                        <span>更新订阅</span>
                    </button>
                    <!-- 编辑按钮 -->
                    <button class="action-btn edit-btn" id="edit-source-btn" onclick="editPluginSource()" style="display: inline-block;">
                        <span class="material-icons">edit</span>
                        <span>编辑</span>
                    </button>
                </div>
            </div>
        </div>
        <div class="border-bottom"></div>
        <div id="plugins-container">
            <div class="loading">加载中...</div>
        </div>
    </div>
</div>

<script>
    // 页面加载时获取插件列表
    window.onload = function() {
    };
    // 页面加载时执行
    document.addEventListener('DOMContentLoaded', function() {
        // 获取版本号
        if (window.appConfig && window.appConfig.version) {
            const versionSpan = document.getElementById('versionSpan');
            if (versionSpan) {
                versionSpan.textContent = `v${window.appConfig.version}`;
            }
        }
        //加载数据
        loadPlugins();
        loadOpenApiConfig();
        loadPluginSource();

        // 添加字体加载完成后的处理
        document.fonts.ready.then(function() {
            document.body.classList.add('fonts-loaded');
        });
    });

    /*============================插件源相关函数=================================*/
    // 加载 OpenAPI 配置
    async function loadPluginSource() {
        const container = document.getElementById('plugin-source');
        try {
            const response = await fetch('/api/plugin-source/load');
            const data = await response.json();
            if (data.success) {
                displayPluginSource(data.data);
            } else {
                container.innerHTML = `<div class="error">加载失败：${data.error}</div>`;
            }
        } catch (error) {
            container.innerHTML = `<div class="error">加载出错：${error.message}</div>`;
        }
    }

    // 显示 OpenAPI 配置
    function displayPluginSource(config) {
        document.getElementById('source-url').textContent = config.source_url || '';
        const editButtonElement = document.getElementById('edit-source-btn');
        if (config.source_url && config.source_url.length > 0) {
            editButtonElement.style.display = 'inline-flex';
        }
    }


    // 刷新订阅源
    async function refreshPluginSource() {
        try {
            const urlElement = document.getElementById('source-url');
            const currentUrl = urlElement.textContent;
            if (!currentUrl) {
                alert('请先设置接口地址！');
                return;
            }
            if (!confirm(`确定要刷新订阅源吗？相同名称插件将被覆盖！`)) {
                return;
            }
            const response = await fetch('/api/plugin-source/refresh', {
                method: 'POST'
            });
            const data = await response.json();

            if (data.success) {
                // 操作成功，重新加载插件列表
                await loadPlugins();
            } else {
                alert(`切换失败：${data.error}`);
            }
        } catch (error) {
            alert(`操作出错：${error.message}`);
        }
    }

    // 编辑插件订阅源地址
    function editPluginSource() {
        const urlElement = document.getElementById('source-url');
        const currentUrl = urlElement.textContent;
        const newUrl = prompt('请输入新的插件源地址:', currentUrl);

        // 检查用户是否点击了取消
        if (newUrl === null) {
            // 用户点击了取消，不执行任何操作
            return;
        }

        // 检查用户是否输入了空字符串
        if (newUrl.trim() === '') {
            alert('插件源地址不能为空！');
            return;
        }

        // 校验 URL 格式
        const urlPattern = /^(https?:\/\/)?([\da-z.-]+)\.([a-z.]{2,6})([/\w .-]*)*\/?$/;
        if (urlPattern.test(newUrl)) {
            // 更新地址
            updatePluginSource(newUrl);
        } else {
            alert('请输入有效的插件源地址！');
        }
    }

    // 更新 OpenAPI 地址
    async function updatePluginSource(newUrl) {
        try {
            const response = await fetch('/api/plugin-source/updateUrl', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ source_url: newUrl })
            });
            const data = await response.json();

            if (data.success) {
                // 更新成功，重新加载插件列表
                await loadPluginSource();
            } else {
                alert(`更新失败：${data.error}`);
            }
        } catch (error) {
            alert(`更新出错：${error.message}`);
        }
    }
    /*============================开放接口函数=================================*/
    // 加载 OpenAPI 配置
    async function loadOpenApiConfig() {
        const container = document.getElementById('openapi-info');
        try {
            const response = await fetch('/api/openapi/load');
            const data = await response.json();
            if (data.success) {
                displayOpenApiConfig(data.data);
            } else {
                container.innerHTML = `<div class="error">加载失败：${data.error}</div>`;
            }
        } catch (error) {
            container.innerHTML = `<div class="error">加载出错：${error.message}</div>`;
        }
    }

    // 显示 OpenAPI 配置
    function displayOpenApiConfig(config) {
        document.getElementById('openapi-url').textContent = config.search_url || '';

        const statusElement = document.getElementById('openapi-status');
        const buttonElement = document.getElementById('toggle-openapi-btn');
        const editButtonElement = document.getElementById('edit-openapi-btn'); // 新增编辑按钮引用

        if (config.enabled) {
            statusElement.className = 'plugin-status status-enabled';
            statusElement.textContent = '已启用';
            buttonElement.className = 'action-btn disable-btn';
            buttonElement.textContent = '禁用';
            // 启用时隐藏编辑按钮
            editButtonElement.style.display = 'none';
        } else {
            statusElement.className = 'plugin-status status-disabled';
            statusElement.textContent = '已禁用';
            buttonElement.className = 'action-btn enable-btn';
            buttonElement.textContent = '启用';
            // 禁用时显示编辑按钮
            editButtonElement.style.display = 'inline-flex';
        }
    }


    // 切换 OpenAPI 状态
    async function toggleOpenApi() {
        try {
            const urlElement = document.getElementById('openapi-url');
            const currentUrl = urlElement.textContent;
            if (!currentUrl) {
                alert('请先设置接口地址！');
                return;
            }
            const response = await fetch('/api/openapi/toggle', {
                method: 'POST'
            });
            const data = await response.json();

            if (data.success) {
                // 操作成功，重新加载配置
                await loadOpenApiConfig();
            } else {
                alert(`切换失败：${data.error}`);
            }
        } catch (error) {
            alert(`操作出错：${error.message}`);
        }
    }

    // 编辑 OpenAPI 地址功能
    function editOpenApiUrl() {
        const urlElement = document.getElementById('openapi-url');
        const currentUrl = urlElement.textContent;
        const newUrl = prompt('请输入新的接口地址:', currentUrl);

        // 检查用户是否点击了取消
        if (newUrl === null) {
            // 用户点击了取消，不执行任何操作
            return;
        }

        // 检查用户是否输入了空字符串
        if (newUrl.trim() === '') {
            alert('接口地址不能为空！');
            return;
        }

        // 校验 URL 格式
        const urlPattern = /^(https?:\/\/)?([\da-z.-]+)\.([a-z.]{2,6})([/\w .-]*)*\/?$/;
        if (urlPattern.test(newUrl)) {
            // 更新接口地址
            updateOpenApiUrl(newUrl);
        } else {
            alert('请输入有效的接口地址！');
        }
    }


    // 更新 OpenAPI 地址
    async function updateOpenApiUrl(newUrl) {
        try {
            const response = await fetch('/api/openapi/updateUrl', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ search_url: newUrl })
            });
            const data = await response.json();

            if (data.success) {
                // 更新成功，重新加载配置
                await loadOpenApiConfig();
            } else {
                alert(`更新失败：${data.error}`);
            }
        } catch (error) {
            alert(`更新出错：${error.message}`);
        }
    }


    /*============================插件函数=================================*/

    // 加载插件列表
    async function loadPlugins() {
        const container = document.getElementById('plugins-container');
        container.innerHTML = '<div class="loading">加载中...</div>';

        try {
            const response = await fetch('/api/js-plugins');
            const data = await response.json();

            if (data.success) {
                displayPlugins(data.data);
            } else {
                container.innerHTML = `<div class="error">加载失败：${data.error}</div>`;
            }
        } catch (error) {
            container.innerHTML = `<div class="error">加载出错：${error.message}</div>`;
        }
    }

    /// 在现有的 script 标签中添加以下函数

    // 插件导入功能
    function uploadPlugins() {
        // 创建文件输入元素
        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = '.js'; // 只允许上传 js 文件
        fileInput.style.display = 'none';

        // 监听文件选择事件
        fileInput.onchange = async function(event) {
            const file = event.target.files[0];
            if (!file) return;

            // 验证文件类型
            if (!file.name.endsWith('.js')) {
                alert('只允许上传 .js 格式的文件');
                return;
            }

            // 创建 FormData 对象
            const formData = new FormData();
            formData.append('file', file);

            try {
                // 上传文件
                const response = await fetch('/api/js-plugins/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    alert('插件导入成功');
                    // 自动刷新插件列表
                    await loadPlugins();
                } else {
                    alert(`插件导入失败：${data.error}`);
                }
            } catch (error) {
                alert(`插件导入出错：${error.message}`);
            }
        };

        // 触发文件选择对话框
        document.body.appendChild(fileInput);
        fileInput.click();
        document.body.removeChild(fileInput);
    }

    // 显示插件列表
    function displayPlugins(plugins) {
        const container = document.getElementById('plugins-container');

        if (!plugins || plugins.length === 0) {
            container.innerHTML = '<div class="empty">没有找到插件</div>';
            return;
        }

        const html = plugins.map(plugin => `
            <div class="plugin-item">
                <div class="plugin-info">
                    <div class="plugin-name">${plugin.name}</div>
                    <div class="plugin-details">
                        <span class="plugin-status ${plugin.enabled ? 'status-enabled' : 'status-disabled'}">
                            ${plugin.enabled ? '已启用' : '已禁用'}
                        </span>
                        ${plugin.error ? ` | 错误：${plugin.error}` : ''}
                    </div>
                </div>
                <div class="plugin-actions">
                    ${plugin.enabled ?
            `<button class="action-btn disable-btn" onclick="togglePlugin('${plugin.name}', false)">
                <span class="material-icons">block</span>
                <span>禁用</span>
            </button>` :
            `<button class="action-btn enable-btn" onclick="togglePlugin('${plugin.name}', true)">
                <span class="material-icons">check_circle</span>
                <span>启用</span>
            </button>
            <button class="action-btn uninstall-btn" onclick="uninstallPlugin('${plugin.name}')">
                <span class="material-icons">delete</span>
                <span>卸载</span>
            </button>`
        }
                </div>
            </div>
        `).join('');

        container.innerHTML = `<div class="plugin-list">${html}</div>`;
    }

    // 启用/禁用插件
    async function togglePlugin(pluginName, enable) {
        try {
            const url = enable ?
                `/api/js-plugins/${pluginName}/enable` :
                `/api/js-plugins/${pluginName}/disable`;

            const response = await fetch(url, {
                method: 'PUT'
            });
            const data = await response.json();

            if (data.success) {
                // 操作成功，重新加载插件列表
                await loadPlugins();
            } else {
                alert(`${enable ? '启用' : '禁用'}插件失败：${data.error}`);
            }
        } catch (error) {
            alert(`${enable ? '启用' : '禁用'}插件出错：${error.message}`);
        }
    }

    // 卸载插件功能
    async function uninstallPlugin(pluginName) {
        if (!confirm(`确定要卸载插件 "${pluginName}" 吗？此操作不可恢复。`)) {
            return;
        }

        try {
            const response = await fetch(`/api/js-plugins/${pluginName}/uninstall`, {
                method: 'DELETE'
            });
            const data = await response.json();

            if (data.success) {
                alert('插件卸载成功');
                // 重新加载插件列表
                await loadPlugins();
            } else {
                alert(`插件卸载失败：${data.error}`);
            }
        } catch (error) {
            alert(`插件卸载出错：${error.message}`);
        }
    }

</script>
